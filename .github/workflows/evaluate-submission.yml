name: AI Evaluation Pipeline

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  models: read
  contents: read

env:
  EVAL_MODEL: "gpt-4o"

jobs:
  evaluate:
    name: Evaluate Submission
    runs-on: ubuntu-latest
    # Only run for solution issues that have just been labeled status/pending-evaluation
    if: >
      github.event.label.name == 'status/pending-evaluation' &&
      contains(github.event.issue.labels.*.name, 'type/solution')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Mark issue as evaluating
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['status/evaluating']
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'status/pending-evaluation'
            }).catch(() => {});

      - name: Run AI evaluation
        id: evaluate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: node scripts/evaluate.js

      - name: Post evaluation comment
        uses: actions/github-script@v7
        env:
          EVALUATION_JSON: ${{ steps.evaluate.outputs.evaluation_json }}
        with:
          script: |
            const evaluation = JSON.parse(process.env.EVALUATION_JSON);
            const total = evaluation.innovation + evaluation.technical_quality +
                          evaluation.documentation + evaluation.feasibility + evaluation.impact;
            
            const model = process.env.EVAL_MODEL || 'gpt-4o';
            const date = new Date().toISOString().split('T')[0];

            const bold = (s) => `**${s}**`;   // ← construct ** at runtime, not in source
            const totalRow = `| ${bold('Total')} | ${bold(total + '/50')} | |`;

            const body = [
              '## AI Evaluation Report',
              '',
              `> Model: \`${model}\` | Date: ${date}`,
              '> This evaluation was generated automatically using a standardized rubric. Final rankings incorporate human judge review.',
              '',
              '### Scores',
              '',
              '| Dimension | Score | Rationale |',
              '|-----------|-------|-----------|',
              `| Innovation | ${evaluation.innovation}/10 | ${evaluation.innovation_rationale} |`,
              `| Technical Quality | ${evaluation.technical_quality}/10 | ${evaluation.technical_quality_rationale} |`,
              `| Documentation | ${evaluation.documentation}/10 | ${evaluation.documentation_rationale} |`,
              `| Feasibility | ${evaluation.feasibility}/10 | ${evaluation.feasibility_rationale} |`,
              `| Impact | ${evaluation.impact}/10 | ${evaluation.impact_rationale} |`,
              totalRow,    // ← use variable instead of inline **
              '',
              '### Strengths',
              evaluation.strengths,
              '',
              '### Areas for Improvement',
              evaluation.improvements,
              '',
              '### Summary',
              evaluation.summary,
              '',
              '---',
              '*To appeal this evaluation, open a Discussion in the [Appeals](../../discussions) category within 48 hours of score publication.*'
            ].join('\n');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Apply evaluated labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['status/evaluated', 'bot/evaluated']
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'status/evaluating'
            }).catch(() => {});

      - name: Update Project v2 fields
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          EVALUATION_JSON: ${{ steps.evaluate.outputs.evaluation_json }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/update-project-fields.js

      - name: Trigger leaderboard update
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'update-leaderboard.yml',
              ref: 'main'
            });

      - name: Handle evaluation failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ **Evaluation pipeline encountered an error.** An organizer will manually trigger re-evaluation. Please check the [Actions log](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions) for details.'
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'status/evaluating'
            }).catch(() => {});
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['status/pending-evaluation']
            });
